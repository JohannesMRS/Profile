<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>Portfolio</title>
  </head>
  <body>
    <main class="h-500">
      <nav>
        <div
          class="hidden w-full font-mono font-bold p-4 sm:flex justify-center items-center gap-20 text-[#013e37] border"
          id="navbar"
        >
          <a href="#home" class="hover:text-[#594579] nav-item">Home</a>
          <a href="#skills" class="nav-item">Skills</a>
          <a href="#project" id="about" class="nav-item">Project</a>
        </div>

        <img
          src="src/assets/hamburger.png"
          alt="hamburger"
          class="sm:hidden w-7 float-end mr-5 mt-5"
          id="hamburger"
        />

        <div class="flex sm:hidden" id="navsm">
          <a href="#">#</a>
          <a href="">#</a>
          <a href="">#</a>
        </div>
      </nav>

      <!-- Home Section Start -->
      <section
        class="h-screen pt-14.5 flex justify-center items-center"
        id="home"
      >
        <div class="w-225 pt-8 mx-auto flex flex-col ml-16 text-justify">
          <p class="text-[24px] font-mono text-[#013e37]" id="myName"></p>
          <h1
            class="text-[64px]"
            data-aos="fade-right"
            data-aos-duration="1200"
            data-aos-delay="500"
          >
            Web Developer
          </h1>
          <p class="text-[24px] font-mono text-[#013e37]">
            Mahasiswa |
            <span
              class="text-[24px] font-mono text-[#013e37]"
              id="subtitle"
            ></span>
          </p>
          <div class="mt-5 flex gap-6">
            <a
              href="#"
              class="border border-[#013e37] p-1.5 hover:text-[#ffefb3] hover:bg-[#013e37] duration-200"
              data-aos="fade-up"
              data-aos-delay="700"
              >Instagram</a
            >
            <a
              href="#"
              class="border border-[#013e37] p-1.5 hover:text-[#ffefb3] hover:bg-[#013e37] duration-200"
              data-aos="fade-up"
              data-aos-delay="800"
              >Github</a
            >
            <a
              href="#"
              class="border border-[#013e37] p-1.5 hover:text-[#ffefb3] hover:bg-[#013e37] duration-200"
              data-aos="fade-up"
              data-aos-delay="900"
              >LinkedIn</a
            >
          </div>
          <p class="mt-10 italic" id="quotes"></p>
        </div>
        <div data-aos="fade-left" data-aos-duration="1200" data-aos-delay="500">
          <img
            src="src/assets/johannes.png"
            alt="johannes"
            class="w-120 mr-52 mb-20"
          />
        </div>
      </section>
      <!-- Home Section End -->

      <!-- Skills Start -->
      <section
        id="skills"
        class="pt-20 bg-[#013e37] h-screen flex flex-col justify-center items-center"
      >
        <div class="flex justify-center items-center gap-10">
          <div
            class="p-3 shadow-[0px_1px_10px_5px_rgba(0,0,0,0.2)]"
            data-aos="fade-down"
            data-aos-duration="500"
          >
            <img
              src="src/assets/javascript.svg"
              alt="javascript"
              class="w-32"
            />
          </div>
          <div
            class="p-3 shadow-[0px_1px_10px_5px_rgba(0,0,0,0.2)]"
            data-aos="fade-down"
            data-aos-delay="200"
            data-aos-duration="500"
          >
            <img src="src/assets/php.png" alt="php" class="w-32" id="php" />
          </div>
          <div
            class="p-3 shadow-[0px_1px_10px_5px_rgba(0,0,0,0.2)]"
            data-aos="fade-down"
            data-aos-delay="300"
            data-aos-duration="500"
          >
            <img src="src/assets/python.png" alt="python" class="w-32" />
          </div>
          <div
            class="p-3 shadow-[0px_1px_10px_5px_rgba(0,0,0,0.2)]"
            data-aos="fade-down"
            data-aos-delay="400"
            data-aos-duration="500"
          >
            <img src="src/assets/c++.png" alt="C++" class="w-32" />
          </div>
          <div
            class="p-3 shadow-[0px_1px_10px_5px_rgba(0,0,0,0.2)]"
            data-aos="fade-down"
            data-aos-delay="500"
            data-aos-duration="500"
          >
            <img src="src/assets/css-3.png" alt="css" class="w-32" />
          </div>
          <div
            class="p-3 shadow-[0px_1px_10px_5px_rgba(0,0,0,0.2)]"
            data-aos="fade-down"
            data-aos-delay="600"
            data-aos-duration="500"
          >
            <img src="src/assets/html-5.png" alt="html" class="w-32" />
          </div>
        </div>

        <div class="flex justify-center items-center gap-10 mt-14">
          <div
            class="p-3 shadow-[0px_1px_10px_5px_rgba(0,0,0,0.2)]"
            data-aos="fade-up"
            data-aos-duration="500"
          >
            <img
              src="src/assets/TailwindCSS.png"
              alt="TailwindCSS"
              class="w-32"
            />
          </div>
          <div
            class="p-3 shadow-[0px_1px_10px_5px_rgba(0,0,0,0.2)]"
            data-aos="fade-up"
            data-aos-delay="200"
            data-aos-duration="500"
          >
            <img src="src/assets/Laravel.png" alt="Laravel" class="w-32" />
          </div>
          <div
            class="p-3 shadow-[0px_1px_10px_5px_rgba(0,0,0,0.2)]"
            data-aos="fade-up"
            data-aos-delay="300"
            data-aos-duration="500"
          >
            <img src="src/assets/Bootstrap.png" alt="bootstrap" class="w-32" />
          </div>
          <div
            class="p-3 shadow-[0px_1px_10px_5px_rgba(0,0,0,0.2)]"
            data-aos="fade-up"
            data-aos-delay="400"
            data-aos-duration="500"
          >
            <img src="src/assets/mysql.png" alt="mysql" class="w-32" />
          </div>
          <div
            class="p-3 shadow-[0px_1px_10px_5px_rgba(0,0,0,0.2)]"
            data-aos="fade-up"
            data-aos-delay="500"
            data-aos-duration="500"
          >
            <img src="src/assets/Git.png" alt="git" class="w-32" />
          </div>
          <div
            class="p-3 shadow-[0px_1px_10px_5px_rgba(0,0,0,0.2)]"
            data-aos="fade-up"
            data-aos-delay="600"
            data-aos-duration="500"
          >
            <img src="src/assets/GitHub.png" alt="github" class="w-32" />
          </div>
        </div>
      </section>
      <!-- Skills End -->

      <!-- Project Start -->
      <section id="project">
        <div>
          <img src="" alt="" />
        </div>
      </section>
      <!-- Project End -->
    </main>

    <script type="module" src="/src/script.js"></script>
  </body>
</html>
